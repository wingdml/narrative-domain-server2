<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Narrative Server Dashboard</title>
    <style>
        body {
            font-family: Segoe UI, Tahoma, sans-serif;
            margin: 20px;
            background: #f7f9fc;
            color: #1f2937;
        }
        h1 { margin-bottom: 8px; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        .card {
            background: #fff;
            border: 1px solid #d7dee8;
            border-radius: 10px;
            padding: 12px;
            min-width: 220px;
        }
        textarea {
            width: 100%;
            max-width: 900px;
            min-height: 180px;
            border-radius: 8px;
            border: 1px solid #c8d0da;
            padding: 10px;
            font-family: Consolas, monospace;
            box-sizing: border-box;
            background: #fff;
        }
        button {
            border: 0;
            border-radius: 8px;
            padding: 8px 12px;
            background: #1459c7;
            color: #fff;
            cursor: pointer;
            margin-right: 8px;
        }
        button.secondary { background: #4b5563; }
        button.danger { background: #b42318; }
        .session {
            border: 1px solid #d7dee8;
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .muted { color: #6b7280; font-size: 13px; }
        code { background: #eef2f8; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Narrative Server Dashboard</h1>
    <p class="muted">This page shows world settings and live multiplayer status from this server.</p>

    <div class="row">
        <div class="card"><strong>Active Sessions</strong><div id="activeSessions">0</div></div>
        <div class="card"><strong>Active Players</strong><div id="activePlayers">0</div></div>
        <div class="card"><strong>Total Players Ever</strong><div id="totalPlayersEver">0</div></div>
        <div class="card"><strong>Uptime (sec)</strong><div id="uptime">0</div></div>
    </div>

    <div style="margin-bottom: 10px;">
        <button id="reloadBtn">Reload</button>
        <button id="saveBtn" class="secondary">Save World Settings</button>
        <button id="resetCounterBtn" class="danger">Reset Total Player Count</button>
    </div>

    <h2>World Settings</h2>
    <textarea id="settings" spellcheck="false"></textarea>

    <h2>Multiplayer Sessions</h2>
    <div id="sessions"></div>

    <script>
        const SETTINGS_API = '/api/settings';
        const STATUS_API = '/api/status';
        const PLAYER_COUNTER_RESET_API = '/api/player_counter/reset';

        async function loadDashboard() {
            const [settingsResp, statusResp] = await Promise.all([
                fetch(SETTINGS_API),
                fetch(STATUS_API)
            ]);

            const settings = await settingsResp.json();
            const status = await statusResp.json();

            document.getElementById('settings').value = settings.content || '';
            document.getElementById('activeSessions').textContent = String(status.multiplayer?.active_sessions || 0);
            document.getElementById('activePlayers').textContent = String(status.multiplayer?.active_players || 0);
            document.getElementById('totalPlayersEver').textContent = String(status.total_players_ever || 0);
            document.getElementById('uptime').textContent = String(Math.floor(status.uptime_seconds || 0));

            const sessionsRoot = document.getElementById('sessions');
            sessionsRoot.innerHTML = '';
            const sessions = (status.multiplayer && status.multiplayer.sessions) || [];
            if (!sessions.length) {
                sessionsRoot.innerHTML = '<p class="muted">No active multiplayer sessions.</p>';
                return;
            }

            sessions.forEach(session => {
                const wrapper = document.createElement('div');
                wrapper.className = 'session';
                const playersHtml = (session.players || []).map(p => {
                    const npcTag = p.is_npc ? 'NPC' : 'PLAYER';
                    return `<li><code>${p.player_name}</code> [${npcTag}] at <code>${p.location}</code> - ${p.location_detail || ''}</li>`;
                }).join('');
                wrapper.innerHTML = `
                    <div><strong>Session:</strong> <code>${session.session_id}</code></div>
                    <div class="muted">Players: ${session.player_count}</div>
                    <ul>${playersHtml}</ul>
                `;
                sessionsRoot.appendChild(wrapper);
            });
        }

        async function saveSettings() {
            const content = document.getElementById('settings').value;
            await fetch(SETTINGS_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            await loadDashboard();
        }

        async function resetPlayerCounter() {
            const ok = confirm('Reset total players ever to 0?');
            if (!ok) return;
            await fetch(PLAYER_COUNTER_RESET_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reset: true })
            });
            await loadDashboard();
        }

        document.getElementById('reloadBtn').addEventListener('click', loadDashboard);
        document.getElementById('saveBtn').addEventListener('click', saveSettings);
        document.getElementById('resetCounterBtn').addEventListener('click', resetPlayerCounter);

        loadDashboard();
        setInterval(loadDashboard, 3000);
    </script>
</body>
</html>
